<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Multi Ping Pong</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="livesBar"></div>

  <!-- Botón de Silencio en la esquina superior izquierda -->
  <button id="soundToggleBtn" onclick="AudioManager.toggle()"
    style="position: fixed; top: 15px; left: 15px; z-index: 1000; width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3);"
    onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.transform='scale(1.05)';"
    onmouseout="this.style.background='rgba(0,0,0,0.6)'; this.style.transform='scale(1)';">
    🔊
  </button>

  <!-- Dropdown de perfil de usuario logueado en la esquina superior derecha -->
  <div id="userProfileCard" style="display: none; position: fixed; top: 15px; right: 15px; z-index: 1000;">
    <div onclick="toggleUserDropdown(event)"
      style="cursor: pointer; display: flex; align-items: center; justify-content: center;">
      <img id="userAvatar" src=""
        style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.85); box-shadow: 0 0 10px rgba(74, 144, 226, 0.5), 0 4px 15px rgba(0, 0, 0, 0.5); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);"
        onmouseover="this.style.transform='scale(1.08) rotate(5deg)'; this.style.borderColor='#4a90e2';"
        onmouseout="this.style.transform='scale(1) rotate(0deg)'; this.style.borderColor='rgba(255, 255, 255, 0.85)';" />
    </div>
    <div id="userDropdownMenu"
      style="display: none; position: absolute; top: 60px; right: 0; background: rgba(18, 18, 18, 0.88); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px; padding: 16px 20px; min-width: 190px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.65); text-align: right; z-index: 1001; transition: all 0.2s ease;">
      <div id="userProfileName"
        style="font-weight: 800; font-size: 15px; color: #fff; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: ltr; letter-spacing: 0.3px;">
      </div>
      <div id="userProfileWinRate"
        style="font-size: 14px; font-weight: bold; color: #2ecc71; margin-bottom: 14px; direction: ltr; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 8px; letter-spacing: 0.2px;">
        Win Rate: --%</div>
      <button onclick="logout(event)"
        style="background: linear-gradient(135deg, #ff4d4d, #d32f2f); color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; width: 100%; font-weight: bold; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(255, 77, 77, 0.2);"
        onmouseover="this.style.filter='brightness(1.1)'; this.style.transform='translateY(-1px)';"
        onmouseout="this.style.filter='none'; this.style.transform='translateY(0px)';">Cerrar sesión</button>
    </div>
  </div>

  <div id="startScreen" class="overlay">
    <div id="startContent" class="centered-content">
      <h1>Multi Ping Pong</h1>
      <h2>Ingresá tu nombre</h2>
      <div class="input-group">
        <input type="text" id="playerName" placeholder="Tu nombre" maxlength="20" autocomplete="off" />
      </div>

      <button id="loginBtn" onclick="loginWithGoogle()"
        style="background-color: #db4437; width: 100%; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#fff"
            d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91a8.78 8.78 0 0 0 2.69-6.6z" />
          <path fill="#fff"
            d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.26a5.58 5.58 0 0 1-8.3-2.92H.73v2.33A9 9 0 0 0 9 18z" />
          <path fill="#fff" d="M3.75 10.62a5.4 5.4 0 0 1 0-3.24V5.05H.73a9 9 0 0 0 0 7.9l3.02-2.33z" />
          <path fill="#fff"
            d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.45A9 9 0 0 0 .73 5.05l3.02 2.33A5.58 5.58 0 0 1 9 3.58z" />
        </svg>
        Jugar Online
      </button>
      <button id="playOnlineBtn" onclick="toggleOnlineMenu()"
        style="background-color: #4a90e2; width: 100%; margin-top: 10px; display: none;">Crear o Unirse</button>

      <!-- Rankings Desplegables -->
      <div id="startScreenRankings"
        style="width: 100%; margin-top: 20px; display: none; flex-direction: column; gap: 15px;">

        <!-- Ranking Semanal -->
        <div class="ranking-card"
          style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; text-align: left; position: relative;">
          <div onclick="toggleRankingDropdown('weekly')"
            style="cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start;">
            <div style="flex: 1;">
              <h3 style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">Ranking Semanal</h3>
              <!-- Preview Pill -->
              <div
                style="background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; font-size: 13px;">
                <div id="weeklyLeaderPreview" style="color: #ccc; font-weight: 500;">🥇 #1 --</div>
                <div id="weeklyUserPreview" style="color: #4da6ff; font-weight: bold;">👤 #-- Vos --</div>
              </div>
            </div>
            <div style="font-size: 30px; margin-left: 10px;">🏆</div>
          </div>
          <!-- Full List (Dropdown Content) -->
          <div id="weeklyDropdownContent"
            style="display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
              <thead>
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.15); color: #999;">
                  <th style="padding: 4px 0; text-align: left;">Puesto</th>
                  <th style="padding: 4px 0; text-align: left;">Jugador</th>
                  <th style="padding: 4px 0; text-align: center;">WR</th>
                  <th style="padding: 4px 0; text-align: right;">Pts</th>
                </tr>
              </thead>
              <tbody id="weeklyLeaderboardBody">
                <!-- Top 10 irán aquí -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Ranking Mensual -->
        <div class="ranking-card"
          style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; text-align: left; position: relative;">
          <div onclick="toggleRankingDropdown('monthly')"
            style="cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start;">
            <div style="flex: 1;">
              <h3 style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">Ranking Mensual</h3>
              <!-- Preview Pill -->
              <div
                style="background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; font-size: 13px;">
                <div id="monthlyLeaderPreview" style="color: #ccc; font-weight: 500;">🥇 #1 --</div>
                <div id="monthlyUserPreview" style="color: #4da6ff; font-weight: bold;">👤 #-- Vos --</div>
              </div>
            </div>
            <div style="font-size: 30px; margin-left: 10px;">🏆</div>
          </div>
          <!-- Full List (Dropdown Content) -->
          <div id="monthlyDropdownContent"
            style="display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
              <thead>
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.15); color: #999;">
                  <th style="padding: 4px 0; text-align: left;">Puesto</th>
                  <th style="padding: 4px 0; text-align: left;">Jugador</th>
                  <th style="padding: 4px 0; text-align: center;">WR</th>
                  <th style="padding: 4px 0; text-align: right;">Pts</th>
                </tr>
              </thead>
              <tbody id="monthlyLeaderboardBody">
                <!-- Top 10 irán aquí -->
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="endContent" class="overlay" style="display: none;">
    <h1 id="winnerName">🎉 ¡Ganador! 🎉</h1>
    <div id="pointsDeltaDisplay"
      style="font-size: clamp(32px, 8vw, 64px); font-weight: bold; margin: 15px 0; display: none;"></div>
    <div id="restartStatusList" style="margin: 15px 0;"></div>
    <button onclick="restartGame()">Jugar de nuevo</button>
    <button onclick="leaveRoom()" style="background-color: #e74c3c; margin-top: 10px;">Salir de Sala</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="js/network.js"></script>

  <!-- Audio & Skins -->
  <script src="js/audio.js"></script>
  <script src="js/skins.js"></script>

  <!-- Auth -->
  <script type="module" src="js/auth/authConfig.js"></script>

  <!-- Scripts -->
  <script src="js/game.js"></script> <!-- primero: define canvas y paddles -->
  <script src="js/input.js"></script> <!-- luego: ya puede usar window.canvas -->
  <script src="js/ui.js"></script>
  <script src="js/resize.js"></script>

  <!-- Online Menu Overlay -->
  <div id="onlineMenu"
    style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid white; border-radius: 10px; color: white; display: none; text-align: center; z-index: 100; min-width: 350px;">

    <!-- Main Menu View -->
    <div id="onlineMainView">
      <h2>Juego Online</h2>
      <br>
      <button onclick="startOnline('create')" style="width: 100%; margin-bottom: 15px;">Crear Sala</button>

      <div style="display: flex; gap: 10px; justify-content: center; width: 100%;">
        <input type="text" id="roomCodeInput" placeholder="Código de Sala"
          style="padding: 10px; font-size: 16px; flex: 1;">
        <button onclick="startOnline('join')" style="flex: 1;">Unirse</button>
      </div>
      <br><br>
      <button onclick="closeOnlineMenu()" style="background: #e74c3c; width: 100%;">Cerrar</button>
    </div>

    <!-- Lobby View -->
    <div id="onlineLobbyView" style="display: none;">
      <h2>Sala: <span id="lobbyRoomCode" style="color: #4a90e2;"></span></h2>
      <p>Jugadores conectados:</p>
      <ul id="lobbyPlayerList" style="list-style: none; padding: 0; margin: 20px 0; font-size: 18px;">
        <!-- Player list items will go here -->
      </ul>

      <button id="readyButton" onclick="network.toggleReady()"
        style="background-color: #f1c40f; width: 100%; margin-bottom: 10px; display: none;">Listo</button>

      <div id="hostControls" style="display: none;">
        <button onclick="network.startGame()" style="background-color: #2ecc71; width: 100%;">Comenzar</button>
      </div>
      <p id="waitingMessage" style="display: none; color: #999;">Esperando al anfitrión...</p>

      <!-- Selector de Skins (Paletas y Estelas) -->
      <div id="skinsContainer" style="width: 100%; margin-top: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; max-height: 250px; overflow-y: auto;"></div>

      <!-- Salir de la Sala -->
      <button onclick="leaveRoom()" style="background-color: #e74c3c; width: 100%; margin-top: 10px;">Salir de la Sala</button>
    </div>
  </div>

  <script>
    // Helper para alertas estéticas con SweetAlert2 (estilo oscuro)
    window.showAlert = function(title, text = "", icon = "warning") {
      if (window.Swal) {
        Swal.fire({
          title: title,
          text: text,
          icon: icon,
          background: '#121212',
          color: '#fff',
          confirmButtonColor: '#4a90e2',
          confirmButtonText: 'Entendido'
        });
      } else {
        alert(`${title}\n${text}`);
      }
    };

    function startOnline(action) {
      const playerName = document.getElementById('playerName').value.trim();
      if (!playerName) {
        window.showAlert("¡Falta tu nombre!", "Por favor, ingresá tu nombre antes de jugar.", "info");
        return;
      }

      // Connect if not initialized
      if (!network.socket) {
        network.connect();
      }

      if (action === 'create') {
        network.createRoom(playerName);
      } else if (action === 'join') {
        const code = document.getElementById('roomCodeInput').value.trim();
        if (code) network.joinRoom(code, playerName);
        else window.showAlert("Código de sala inválido", "Ingresa un código de sala para unirte.", "warning");
      }
    }

    // Expose toggle functions
    window.toggleOnlineMenu = function () {
      const menu = document.getElementById('onlineMenu');
      const startScreen = document.getElementById('startScreen');
      const isOpening = menu.style.display !== 'block';

      if (isOpening) {
        const playerName = document.getElementById('playerName').value.trim();
        if (!playerName) {
          window.showAlert("¡Falta tu nombre!", "Por favor, ingresá tu nombre antes de jugar.", "info");
          return;
        }
        menu.style.display = 'block';
        if (startScreen) startScreen.style.display = 'none';
      } else {
        menu.style.display = 'none';
        if (startScreen) startScreen.style.display = 'flex';
      }
    };

    window.closeOnlineMenu = function () {
      document.getElementById('onlineMenu').style.display = 'none';
      const startScreen = document.getElementById('startScreen');
      if (startScreen) startScreen.style.display = 'flex';
    };
  </script>

</body>

</html>
