<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Pong 4 Jugadores - MVP</title>
  <style>
    body {
  margin: 0;
  overflow: hidden;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 100vh;
}
canvas {
  display: block;
  background: #111;
}
#livesBar {
  width: 100vw;
  height: 40px;
  color: #fff;
  font-family: Arial, sans-serif;
  font-size: 22px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-top: 10px;
  margin-bottom: 10px;
  z-index: 2;
  position: relative;
  background: transparent;
}
  </style>
</head>
<body>
  <div id="livesBar"></div>
  <canvas id="gameCanvas"></canvas>

  <script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Hacer el canvas cuadrado y centrado
  const topMargin = 20;   // espacio para la línea de vidas
const bottomMargin = 20; // espacio inferior opcional
const size = Math.min(window.innerWidth, window.innerHeight - topMargin - bottomMargin);
canvas.width = size;
canvas.height = size;

  const cornerLength = 80; // igual que el largo de las esquinas
  const paddleWidth = 100;
  const paddleHeight = 20;
  const speed = 7;

  const cornerWallLong = 120; // largo de la pared de esquina
const cornerWallShort = 30; // ancho de la pared de esquina

const paddles = [
  // Arriba (rojo)
  {
    x: cornerWallLong,
    y: 10,
    w: paddleWidth,
    h: paddleHeight,
    color: 'red',
    keys: ['ArrowLeft', 'ArrowRight'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.width - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'top'
  },
  // Izquierda (azul)
  {
    x: canvas.width - 10 - paddleHeight,
    y: cornerWallLong,
    w: paddleHeight,
    h: paddleWidth,
    color: 'blue',
    keys: ['KeyW', 'KeyS'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.height - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'left'
  },
  // Abajo (amarillo)
  {
    x: cornerWallLong,
    y: canvas.height - 30,
    w: paddleWidth,
    h: paddleHeight,
    color: 'yellow',
    keys: ['KeyA', 'KeyD'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.width - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'bottom'
  },
  // Derecha (verde)
  {
    x: 10,
    y: cornerWallLong,
    w: paddleHeight,
    h: paddleWidth,
    color: 'green',
    keys: ['KeyJ', 'KeyL'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.height - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'right'
  }
];

  const cornerWalls = [
    { x: 0, y: 0, w: 120, h: 30 },
    { x: 0, y: 0, w: 30, h: 120 },
    { x: canvas.width - 120, y: 0, w: 120, h: 30 },
    { x: canvas.width - 30, y: 0, w: 30, h: 120 },
    { x: 0, y: canvas.height - 30, w: 120, h: 30 },
    { x: 0, y: canvas.height - 120, w: 30, h: 120 },
    { x: canvas.width - 120, y: canvas.height - 30, w: 120, h: 30 },
    { x: canvas.width - 30, y: canvas.height - 120, w: 30, h: 120 }
  ];

  function getRandomCornerPosition() {
    const offset = 60;
    const positions = [
      { x: offset, y: offset },
      { x: canvas.width - offset, y: offset },
      { x: offset, y: canvas.height - offset },
      { x: canvas.width - offset, y: canvas.height - offset }
    ];
    return positions[Math.floor(Math.random() * positions.length)];
  }

  const startPos = getRandomCornerPosition();
  const ball = {
    x: startPos.x,
    y: startPos.y,
    r: 10,
    dx: Math.random() < 0.5 ? 5 : -5,
    dy: Math.random() < 0.5 ? 5 : -5,
    color: 'white'
  };

  const keysPressed = {};
  window.addEventListener('keydown', (e) => keysPressed[e.code] = true);
  window.addEventListener('keyup', (e) => keysPressed[e.code] = false);

  function movePaddles() {
    paddles.forEach((p, i) => {
      if (keysPressed[p.keys[0]]) p.dx = -speed;
      else if (keysPressed[p.keys[1]]) p.dx = speed;
      else p.dx = 0;

      if (p.w > p.h) {
        // Horizontal (arriba y abajo)
        p.x += p.dx;
        p.x = Math.max(p.min, Math.min(p.max, p.x));
      } else {
        // Vertical (izquierda y derecha)
        p.y += p.dx;
        p.y = Math.max(p.min, Math.min(p.max, p.y));
      }
    });
  }

  function drawPaddles() {
    paddles.forEach(p => {
      if (p.lives > 0) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Ya no dibujar las vidas aquí
      }
    });
  }

  // Nueva función para dibujar las vidas arriba del canvas
  function drawLives() {
  const livesBar = document.getElementById('livesBar');
  livesBar.innerHTML = paddles.map(p =>
    `<span style="color:${p.color};margin:0 20px;">❤ ${p.lives > 0 ? p.lives : 0}</span>`
  ).join('');
}

  function drawWalls() {
    ctx.fillStyle = '#555';
    cornerWalls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
  }

  function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.fill();
    ctx.closePath();
  }

  function resetBall() {
    const startPos = getRandomCornerPosition();
    ball.x = startPos.x;
    ball.y = startPos.y;

    let dx, dy, ratio;
    do {
      const angle = Math.random() * 2 * Math.PI;
      dx = Math.cos(angle) * 5;
      dy = Math.sin(angle) * 5;
      ratio = Math.abs(dx / dy);
    } while (
      Math.abs(dx) < 2.2 || Math.abs(dy) < 2.2 || // evita trayectorias casi horizontales/verticales
      ratio > 0.55 && ratio < 1.8                 // evita diagonales y trayectorias muy cuadradas
    );

    ball.dx = dx;
    ball.dy = dy;
  }

  // Añade paredes completas cuando un jugador pierde todas sus vidas
  function closeWall(side) {
    if (side === 'top') {
      cornerWalls.push({
        x: cornerWallLong,
        y: 0,
        w: canvas.width - 2 * cornerWallLong,
        h: 30
      });
    } else if (side === 'bottom') {
      cornerWalls.push({
        x: cornerWallLong,
        y: canvas.height - 30,
        w: canvas.width - 2 * cornerWallLong,
        h: 30 // <-- Cambiado de 10 a 30
      });
    } else if (side === 'left') {
      cornerWalls.push({
        x: canvas.width - 30,
        y: cornerWallLong,
        w: 30, // <-- Cambiado de 10 a 30
        h: canvas.height - 2 * cornerWallLong
      });
    } else if (side === 'right') {
      cornerWalls.push({
        x: 0,
        y: cornerWallLong,
        w: 30,
        h: canvas.height - 2 * cornerWallLong
      });
    }
  }

  let gameOver = false;

  function updateBall() {
    if (gameOver) return;

    ball.x += ball.dx;
    ball.y += ball.dy;

    // Rebote en paredes esquinas
    cornerWalls.forEach(w => {
      if (
        ball.x + ball.r > w.x &&
        ball.x - ball.r < w.x + w.w &&
        ball.y + ball.r > w.y &&
        ball.y - ball.r < w.y + w.h
      ) {
        const overlapX = Math.min(ball.x + ball.r - w.x, w.x + w.w - (ball.x - ball.r));
        const overlapY = Math.min(ball.y + ball.r - w.y, w.y + w.h - (ball.y - ball.r));
        if (overlapX < overlapY) {
          ball.dx *= -1;
          if (ball.x < w.x) ball.x = w.x - ball.r;
          else ball.x = w.x + w.w + ball.r;
        } else {
          ball.dy *= -1;
          if (ball.y < w.y) ball.y = w.y - ball.r;
          else ball.y = w.y + w.h + ball.r;
        }
      }
    });

    // Colisión con paletas
    paddles.forEach(p => {
      if (
        p.lives > 0 &&
        ball.x + ball.r > p.x &&
        ball.x - ball.r < p.x + p.w &&
        ball.y + ball.r > p.y &&
        ball.y - ball.r < p.y + p.h
      ) {
        if (p.w > p.h) {
          ball.dy *= -1;
          ball.y += ball.dy;
        } else {
          ball.dx *= -1;
          ball.x += ball.dx;
        }
      }
    });

    // Detectar si la pelota sale por el lado de un jugador
    // Arriba
    if (ball.y + ball.r < 0) {
      let p = paddles[0];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('top');
        }
      }
      resetBall();
    }
    // Abajo
    else if (ball.y - ball.r > canvas.height) {
      let p = paddles[2];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('bottom');
        }
      }
      resetBall();
    }
    // Derecha
    else if (ball.x - ball.r > canvas.width) {
      let p = paddles[1];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('left');
        }
      }
      resetBall();
    }
    // Izquierda
    else if (ball.x + ball.r < 0) {
      let p = paddles[3];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('right');
        }
      }
      resetBall();
    }

    // Verificar si solo queda un jugador
    const vivos = paddles.filter(p => p.lives > 0);
    if (vivos.length === 1) {
      gameOver = true;
      setTimeout(() => {
        ctx.fillStyle = "#fff";
        ctx.font = "48px Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          `¡Ganador: ${vivos[0].color.toUpperCase()}!`,
          canvas.width / 2,
          canvas.height / 2
        );
      }, 100);
    }
  }

  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLives(); // <-- Añade esto
    movePaddles();
    updateBall();
    drawWalls();
    drawPaddles();
    drawBall();
    if (!gameOver) requestAnimationFrame(gameLoop);
  }

  gameLoop();
  </script>
</body>
</html>
