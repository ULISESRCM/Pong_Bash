<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Pong 4 Jugadores - MVP</title>
  <style>
    body {
  margin: 0;
  overflow: hidden;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 100vh;
}

canvas {
  display: block;
  background: #111;
  display: block;
  max-width: 100vw;
  max-height: 100vw;
  width: 100%;
  height: auto;
}

#livesBar {
  width: 100%;
  height: 40px;
  color: #fff;
  font-family: Arial, sans-serif;
  font-size: 4vw;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
  position: relative;
  background: transparent;
}
#startScreen input, #startScreen button {
  font-size: 4vw;
  padding: 2vw 4vw;
  margin: 1vw;
}
  </style>
</head>
<body>
  <div id="livesBar"></div>
  <div id="startScreen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background-color:rgba(0,0,0,0.8); color:#fff;">
  <div id="startContent" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;">
    <h1>Ping Pong 4 Jugadores</h1>
    <div>
      <input type="text" placeholder="Jugador Rojo" id="nameRed" style="margin:5px;" value="Rojo">
      <input type="text" placeholder="Jugador Azul" id="nameBlue" style="margin:5px;" value="Azul">
      <input type="text" placeholder="Jugador Amarillo" id="nameYellow" style="margin:5px;" value="Amarillo">
      <input type="text" placeholder="Jugador Verde" id="nameGreen" style="margin:5px;" value="Verde">
    </div>
    <button onclick="startGame()">Jugar</button>
  </div>
  <div id="endContent" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:100; flex-direction:column; align-items:center; justify-content:center;">
    <h1 id="winnerName" style="color: #fff; margin-bottom: 30px;">🎉 ¡Ganador! 🎉</h1>
    <button onclick="restartGame()" style="background: #222; color: #fff; font-size: 22px; padding: 12px 32px; border-radius: 10px; border: none; cursor: pointer;">Jugar de nuevo</button>
  </div>
</div>


  <canvas id="gameCanvas"></canvas>

  <script>
    
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const topMargin = 60;
  const bottomMargin = 30;
  const sideMargin = 30; // margen lateral agregado
  const size = Math.min(window.innerWidth - 2 * sideMargin, window.innerHeight - topMargin - bottomMargin);
  canvas.width = size;
  canvas.height = size;
  canvas.style.marginLeft = sideMargin + "px";
  canvas.style.marginRight = sideMargin + "px";
}

window.addEventListener('resize', () => {
  resizeCanvas();
  resetGame(); // Reposiciona paletas y muros al nuevo tamaño
});

resizeCanvas();


  const cornerLength = 80; // igual que el largo de las esquinas
  const paddleWidth = 100;
  const paddleHeight = 20;
  const speed = 7;
  let ballSpeed = 5;

  const cornerWallLong = 100; // largo de la pared de esquina (antes 120)
const cornerWallShort = 30; // ancho de la pared de esquina (antes 30)

const paddles = [
  // Arriba (rojo)
  {
    x: cornerWallLong,
    y: 10,
    w: paddleWidth,
    h: paddleHeight,
    color: 'red',
    keys: ['ArrowLeft', 'ArrowRight'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.width - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'top'
  },
  // Izquierda (azul)
  {
    x: canvas.width - 10 - paddleHeight,
    y: cornerWallLong,
    w: paddleHeight,
    h: paddleWidth,
    color: 'blue',
    keys: ['KeyW', 'KeyS'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.height - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'left'
  },
  // Abajo (amarillo)
  {
    x: cornerWallLong,
    y: canvas.height - 10 - paddleHeight, // <-- igual que el margen superior de la roja
    w: paddleWidth,
    h: paddleHeight,
    color: 'yellow',
    keys: ['KeyA', 'KeyD'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.width - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'bottom'
  },
  // Derecha (verde)
  {
    x: 10,
    y: cornerWallLong,
    w: paddleHeight,
    h: paddleWidth,
    color: 'green',
    keys: ['KeyJ', 'KeyL'],
    dx: 0,
    min: cornerWallLong,
    max: canvas.height - cornerWallLong - paddleWidth,
    lives: 5,
    side: 'right'
  }
];

  const cornerWalls = [
    { x: 0, y: 0, w: cornerWallLong, h: cornerWallShort },
    { x: 0, y: 0, w: cornerWallShort, h: cornerWallLong },
    { x: canvas.width - cornerWallLong, y: 0, w: cornerWallLong, h: cornerWallShort },
    { x: canvas.width - cornerWallShort, y: 0, w: cornerWallShort, h: cornerWallLong },
    { x: 0, y: canvas.height - cornerWallShort, w: cornerWallLong, h: cornerWallShort },
    { x: 0, y: canvas.height - cornerWallLong, w: cornerWallShort, h: cornerWallLong },
    { x: canvas.width - cornerWallLong, y: canvas.height - cornerWallShort, w: cornerWallLong, h: cornerWallShort },
    { x: canvas.width - cornerWallShort, y: canvas.height - cornerWallLong, w: cornerWallShort, h: cornerWallLong }
  ];

  function getRandomCornerPosition() {
    const offset = 60;
    const positions = [
      { x: offset, y: offset },
      { x: canvas.width - offset, y: offset },
      { x: offset, y: canvas.height - offset },
      { x: canvas.width - offset, y: canvas.height - offset }
    ];
    return positions[Math.floor(Math.random() * positions.length)];
  }

  const startPos = getRandomCornerPosition();
let dx, dy, ratio;
do {
  const angle = Math.random() * 2 * Math.PI;
  dx = Math.cos(angle) * ballSpeed;
  dy = Math.sin(angle) * ballSpeed;
  ratio = Math.abs(dx / dy);
} while (
  Math.abs(dx) < 2.2 || Math.abs(dy) < 2.2 ||
  (ratio > 0.85 && ratio < 1.18)
);

const ball = {
  x: startPos.x,
  y: startPos.y,
  r: 10,
  dx: dx,
  dy: dy,
  color: 'white'
};

  const keysPressed = {};
  window.addEventListener('keydown', (e) => keysPressed[e.code] = true);
  window.addEventListener('keyup', (e) => keysPressed[e.code] = false);

  function movePaddles() {
    paddles.forEach((p, i) => {
      if (keysPressed[p.keys[0]]) p.dx = -speed;
      else if (keysPressed[p.keys[1]]) p.dx = speed;
      else p.dx = 0;

      if (p.w > p.h) {
        // Horizontal (arriba y abajo)
        p.x += p.dx;
        p.x = Math.max(p.min, Math.min(p.max, p.x));
      } else {
        // Vertical (izquierda y derecha)
        p.y += p.dx;
        p.y = Math.max(p.min, Math.min(p.max, p.y));
      }
    });
  }

  function drawPaddles() {
    paddles.forEach(p => {
      if (p.lives > 0) {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Ya no dibujar las vidas aquí
      }
    });
  }

  // Nueva función para dibujar las vidas arriba del canvas
  function drawLives() {
  const livesBar = document.getElementById('livesBar');
  livesBar.innerHTML = paddles.map(p =>
    `<span style="color:${p.color};margin:0 20px;">❤ ${p.lives > 0 ? p.lives : 0}</span>`
  ).join('');
}

  function drawWalls() {
    ctx.fillStyle = '#555';
    cornerWalls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
  }

  function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.fill();
    ctx.closePath();
  }
function getRandomAngleAvoidingCardinals() {
  let angle;
  do {
    angle = Math.random() * 2 * Math.PI;
    const deg = (angle * 180) / Math.PI;
    const forbiddenAngles = [0, 45, 90, 135, 180, 225, 270, 315, 360];
    const isTooClose = forbiddenAngles.some(base => Math.abs(deg - base) < 10);
  } while (isTooClose);
  return angle;
}

function resetBall() {
  ballSpeed += 0.7; // Aumenta la velocidad cada vez que se reinicia

  const startPos = getRandomCornerPosition();
  ball.x = startPos.x;
  ball.y = startPos.y;

  let dx, dy, ratio;
  do {
    const angle = Math.random() * 2 * Math.PI;
    dx = Math.cos(angle) * ballSpeed;
    dy = Math.sin(angle) * ballSpeed;
    ratio = Math.abs(dx / dy);
  } while (
    Math.abs(dx) < 2.2 || Math.abs(dy) < 2.2 ||
    (ratio > 0.85 && ratio < 1.18)
  );

  ball.dx = dx;
  ball.dy = dy;
}


  // Añade paredes completas cuando un jugador pierde todas sus vidas
  function closeWall(side) {
    if (side === 'top') {
      cornerWalls.push({
        x: cornerWallLong,
        y: 0,
        w: canvas.width - 2 * cornerWallLong,
        h: 30
      });
    } else if (side === 'bottom') {
      cornerWalls.push({
        x: cornerWallLong,
        y: canvas.height - 30,
        w: canvas.width - 2 * cornerWallLong,
        h: 30 // <-- Cambiado de 10 a 30
      });
    } else if (side === 'left') {
      cornerWalls.push({
        x: canvas.width - 30,
        y: cornerWallLong,
        w: 30, // <-- Cambiado de 10 a 30
        h: canvas.height - 2 * cornerWallLong
      });
    } else if (side === 'right') {
      cornerWalls.push({
        x: 0,
        y: cornerWallLong,
        w: 30,
        h: canvas.height - 2 * cornerWallLong
      });
    }
  }

  let gameOver = false;

  function updateBall() {
  if (gameOver) return;

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Rebote en paredes esquinas
  cornerWalls.forEach(w => {
    if (
      ball.x + ball.r > w.x &&
      ball.x - ball.r < w.x + w.w &&
      ball.y + ball.r > w.y &&
      ball.y - ball.r < w.y + w.h
    ) {
      const overlapX = Math.min(ball.x + ball.r - w.x, w.x + w.w - (ball.x - ball.r));
      const overlapY = Math.min(ball.y + ball.r - w.y, w.y + w.h - (ball.y - ball.r));
      if (overlapX < overlapY) {
        ball.dx *= -1;
        if (ball.x < w.x) ball.x = w.x - ball.r;
        else ball.x = w.x + w.w + ball.r;
      } else {
        ball.dy *= -1;
        if (ball.y < w.y) ball.y = w.y - ball.r;
        else ball.y = w.y + w.h + ball.r;
      }
    }
  });

  // Colisión con paletas
  paddles.forEach(p => {
    if (
      p.lives > 0 &&
      ball.x + ball.r > p.x &&
      ball.x - ball.r < p.x + p.w &&
      ball.y + ball.r > p.y &&
      ball.y - ball.r < p.y + p.h
    ) {
      if (p.w > p.h) {
        ball.dy *= -1;
        ball.y += ball.dy;
      } else {
        ball.dx *= -1;
        ball.x += ball.dx;
      }
    }
  });

  // Detectar si la pelota sale por el lado de un jugador
  if (ball.y + ball.r < 0) {
    let p = paddles[0];
    if (p.lives > 0) {
      p.lives--;
      if (p.lives === 0) {
        closeWall('top');
      }
    }
    resetBall();
  }
  else if (ball.y - ball.r > canvas.height) {
    let p = paddles[2];
    if (p.lives > 0) {
      p.lives--;
      if (p.lives === 0) {
        closeWall('bottom');
      }
    }
    resetBall();
  }
  else if (ball.x - ball.r > canvas.width) {
    let p = paddles[1];
    if (p.lives > 0) {
      p.lives--;
      if (p.lives === 0) {
        closeWall('left');
      }
    }
    resetBall();
  }
  else if (ball.x + ball.r < 0) {
    let p = paddles[3];
    if (p.lives > 0) {
      p.lives--;
      if (p.lives === 0) {
        closeWall('right');
      }
    }
    resetBall();
  }

  // Verificar si solo queda un jugador
  const vivos = paddles.filter(p => p.lives > 0);
  if (vivos.length === 1) {
    gameOver = true;
    drawLives(); // Fuerza el refresco de las vidas en pantalla
    setTimeout(() => {
      const ganadorIndex = paddles.indexOf(vivos[0]);
      const nombreGanador = playerNames[ganadorIndex];

      document.getElementById('winnerName').textContent = `🎉 ¡Ganador: ${nombreGanador}! 🎉`;
      document.getElementById('startScreen').style.display = 'flex';
      document.getElementById('startContent').style.display = 'none';
      document.getElementById('endContent').style.display = 'flex';
    }, 400); // Un pequeño retraso para que se vea la resta de la última vida
}
}


    // Colisión con paletas
    paddles.forEach(p => {
      if (
        p.lives > 0 &&
        ball.x + ball.r > p.x &&
        ball.x - ball.r < p.x + p.w &&
        ball.y + ball.r > p.y &&
        ball.y - ball.r < p.y + p.h
      ) {
        if (p.w > p.h) {
          ball.dy *= -1;
          ball.y += ball.dy;
        } else {
          ball.dx *= -1;
          ball.x += ball.dx;
        }
      }
    });

    // Detectar si la pelota sale por el lado de un jugador
    // Arriba
    if (ball.y + ball.r < 0) {
      let p = paddles[0];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('top');
        }
      }
      resetBall();
    }
    // Abajo
    else if (ball.y - ball.r > canvas.height) {
      let p = paddles[2];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('bottom');
        }
      }
      resetBall();
    }
    // Derecha
    else if (ball.x - ball.r > canvas.width) {
      let p = paddles[1];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('left');
        }
      }
      resetBall();
    }
    // Izquierda
    else if (ball.x + ball.r < 0) {
      let p = paddles[3];
      if (p.lives > 0) {
        p.lives--;
        if (p.lives === 0) {
          closeWall('right');
        }
      }
      resetBall();
    }

    // Verificar si solo queda un jugador
    const vivos = paddles.filter(p => p.lives > 0);
    if (vivos.length === 1) {
      gameOver = true;
      setTimeout(() => {
        ctx.fillStyle = "#fff";
        ctx.font = "48px Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          `¡Ganador: ${vivos[0].color.toUpperCase()}!`,
          canvas.width / 2,
          canvas.height / 2
        );
      }, 100);
    }

  function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLives(); // <-- Añade esto
    movePaddles();
    updateBall();
    drawWalls();
    drawPaddles();
    drawBall();
    if (!gameOver) requestAnimationFrame(gameLoop);
  }

  // gameLoop(); // Elimina o comenta esta línea

let playerNames = ["Rojo", "Azul", "Amarillo", "Verde"];

function startGame() {
  const inputs = [
    document.getElementById('nameRed').value.trim(),
    document.getElementById('nameBlue').value.trim(),
    document.getElementById('nameYellow').value.trim(),
    document.getElementById('nameGreen').value.trim()
  ];

  // Solo inicia si los 4 nombres están completos
  if (inputs.some(name => name === "")) {
    alert("Por favor, ingresa los nombres de los 4 jugadores.");
    return;
  }

  playerNames = inputs;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('startContent').style.display = 'flex';
  document.getElementById('endContent').style.display = 'none';

  resetGame();
  gameOver = false;
  gameLoop(); // <-- El juego solo inicia aquí, después de validar los nombres
}


function resetGame() {
  resizeCanvas(); // Asegura que el canvas se ajuste al nuevo tamaño antes de colocar elementos

  // Actualiza dimensiones relacionadas al nuevo tamaño del canvas
  const paddleWidth = 100;
  const paddleHeight = 20;
  const cornerWallLong = 100;
  const cornerWallShort = 30;

  // Reposicionar paletas
  paddles[0].x = cornerWallLong;
  paddles[0].y = 10;
  paddles[0].w = paddleWidth;
  paddles[0].h = paddleHeight;
  paddles[0].min = cornerWallLong;
  paddles[0].max = canvas.width - cornerWallLong - paddleWidth;

  paddles[1].x = canvas.width - 10 - paddleHeight;
  paddles[1].y = cornerWallLong;
  paddles[1].w = paddleHeight;
  paddles[1].h = paddleWidth;
  paddles[1].min = cornerWallLong;
  paddles[1].max = canvas.height - cornerWallLong - paddleWidth;

  paddles[2].x = cornerWallLong;
  paddles[2].y = canvas.height - 10 - paddleHeight;
  paddles[2].w = paddleWidth;
  paddles[2].h = paddleHeight;
  paddles[2].min = cornerWallLong;
  paddles[2].max = canvas.width - cornerWallLong - paddleWidth;

  paddles[3].x = 10;
  paddles[3].y = cornerWallLong;
  paddles[3].w = paddleHeight;
  paddles[3].h = paddleWidth;
  paddles[3].min = cornerWallLong;
  paddles[3].max = canvas.height - cornerWallLong - paddleWidth;

  // Restablecer vidas
  paddles.forEach(p => p.lives = 5);

  // Reestablecer velocidad inicial de pelota
  ballSpeed = 5;

  // Redibujar paredes de esquina
  cornerWalls.length = 0;
  cornerWalls.push(
    { x: 0, y: 0, w: cornerWallLong, h: cornerWallShort },
    { x: 0, y: 0, w: cornerWallShort, h: cornerWallLong },
    { x: canvas.width - cornerWallLong, y: 0, w: cornerWallLong, h: cornerWallShort },
    { x: canvas.width - cornerWallShort, y: 0, w: cornerWallShort, h: cornerWallLong },
    { x: 0, y: canvas.height - cornerWallShort, w: cornerWallLong, h: cornerWallShort },
    { x: 0, y: canvas.height - cornerWallLong, w: cornerWallShort, h: cornerWallLong },
    { x: canvas.width - cornerWallLong, y: canvas.height - cornerWallShort, w: cornerWallLong, h: cornerWallShort },
    { x: canvas.width - cornerWallShort, y: canvas.height - cornerWallLong, w: cornerWallShort, h: cornerWallLong }
  );

  // Resetear pelota
  resetBall();
}


function restartGame() {
  // Rellena los campos de nombres con los valores por defecto
  document.getElementById('nameRed').value = "Rojo";
  document.getElementById('nameBlue').value = "Azul";
  document.getElementById('nameYellow').value = "Amarillo";
  document.getElementById('nameGreen').value = "Verde";

  // Muestra el formulario de nombres y oculta la pantalla de ganador
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('startContent').style.display = 'flex';
  document.getElementById('endContent').style.display = 'none';
}

let noGoalTimer = null;
let noGoalTimeout = 30000; // 30 segundos

function startNoGoalTimer() {
  if (noGoalTimer) clearTimeout(noGoalTimer);
  noGoalTimer = setTimeout(() => {
    // Aumenta la velocidad de la pelota
    if (Math.abs(ball.dx) < 20 && Math.abs(ball.dy) < 20) { // límite de velocidad máxima opcional
      ball.dx *= 1.25;
      ball.dy *= 1.25;
    }
    startNoGoalTimer(); // reinicia el temporizador para el siguiente ciclo
  }, noGoalTimeout);
}

let draggingPaddle = null;
let dragOffset = 0;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  // Verificar todas las paletas en orden
  paddles.forEach((paddle, index) => {
    if (paddle.lives > 0 && 
        x > paddle.x && 
        x < paddle.x + paddle.w && 
        y > paddle.y && 
        y < paddle.y + paddle.h) {
      draggingPaddle = index;
      // Determinar el offset correcto según la orientación
      if (paddle.w > paddle.h) { // Paleta horizontal
        dragOffset = x - paddle.x;
      } else { // Paleta vertical
        dragOffset = y - paddle.y;
      }
    }
  });
});

canvas.addEventListener('touchmove', function(e) {
  if (draggingPaddle === null) return;
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  const paddle = paddles[draggingPaddle];
  
  if (paddle.w > paddle.h) { // Paleta horizontal (rojo/amarillo)
    paddle.x = Math.max(paddle.min, Math.min(paddle.max, x - dragOffset));
  } else { // Paleta vertical (azul/verde)
    paddle.y = Math.max(paddle.min, Math.min(paddle.max, y - dragOffset));
  }
});

canvas.addEventListener('touchend', function(e) {
  draggingPaddle = null;
});
  </script>
</body>
</html>
